# Language-specific build, test, and installation commands
# Used by workflow system to support multi-language projects

# Node.js / JavaScript / TypeScript
node:
  detect_files:
    - package.json
  build: npm run build
  test: npm test
  install: npm install
  migrate: null
  migration_frameworks:
    - knex migrations/
    - sequelize migrations/
    - typeorm migrations/
    - npm run migrate

# Python
python:
  detect_files:
    - requirements.txt
    - pyproject.toml
    - setup.py
  build: pip install -e .
  test: pytest
  install: pip install -r requirements.txt
  migrate: null
  migration_frameworks:
    - alembic upgrade head
    - alembic/
    - migrations/

# Rust
rust:
  detect_files:
    - Cargo.toml
  build: cargo build --release
  test: cargo test
  install: cargo build
  migrate: null
  migration_frameworks:
    - sqlx migrate run
    - sqlx/migrations/
    - diesel/migrations/

# Go
go:
  detect_files:
    - go.mod
  build: go build ./...
  test: go test ./...
  install: go mod download
  migrate: null
  migration_frameworks:
    - migrate -path migrations -database postgres up
    - migrations/
    - sqlc/

# Java (Maven)
java-maven:
  detect_files:
    - pom.xml
  build: mvn clean compile
  test: mvn test
  install: mvn install
  migrate: null
  migration_frameworks:
    - mvn flyway:migrate
    - mvn liquibase:update
    - src/main/resources/db/migration/

# Java (Gradle)
java-gradle:
  detect_files:
    - build.gradle
    - build.gradle.kts
  build: gradle build
  test: gradle test
  install: gradle build
  migrate: null
  migration_frameworks:
    - gradle flywayMigrate
    - gradle liquibaseUpdate
    - src/main/resources/db/migration/

# Ruby
ruby:
  detect_files:
    - Gemfile
  build: bundle install
  test: rspec
  install: bundle install
  migrate: null
  migration_frameworks:
    - rake db:migrate
    - db/migrate/

# C/C++ (Make)
cpp-make:
  detect_files:
    - Makefile
  build: make
  test: make test
  install: make
  migrate: null
  migration_frameworks:
    - null  # C/C++ typically doesn't use migrations

# C/C++ (CMake)
cpp-cmake:
  detect_files:
    - CMakeLists.txt
  build: cmake --build .
  test: ctest
  install: cmake --build . --target install
  migrate: null
  migration_frameworks:
    - null  # C/C++ typically doesn't use migrations

# PHP
php:
  detect_files:
    - composer.json
  build: composer install
  test: phpunit
  install: composer install
  migrate: null
  migration_frameworks:
    - php artisan migrate
    - doctrine:migrations:migrate
    - migrations/

# Generic (if only Makefile found)
generic-make:
  detect_files:
    - Makefile
  build: make
  test: make test
  install: make
  migrate: null
